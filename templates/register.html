<!-- 调试信息 - 注册功能使用 f-string 拼接 SQL，存在 SQL 注入漏洞 -->
{% extends "base.html" %}
{% block content %}
<div class="card login-card">
    <h1>用户注册</h1>
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/register">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="text" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="text" id="email" name="email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-submit">注册</button>
    </form>
    <p class="form-footer">已有账号？<a href="/login">去登录</a></p>
</div>
{% endblock %}
