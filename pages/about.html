<h1>ℹ️ 关于本站</h1>

<div class="help-section">
    <h2>项目简介</h2>
    <p>本系统是一个基于 Python Flask 框架构建的 Web 安全教学演示项目，涵盖 SQL 注入、文件上传、业务逻辑漏洞、文件包含漏洞的完整复现与修复过程。</p>
</div>

<div class="help-section">
    <h2>技术栈</h2>
    <table class="data-table">
        <thead>
            <tr><th>技术</th><th>用途</th></tr>
        </thead>
        <tbody>
            <tr><td>Python Flask</td><td>Web 框架</td></tr>
            <tr><td>SQLite</td><td>数据库</td></tr>
            <tr><td>Jinja2</td><td>模板引擎</td></tr>
            <tr><td>Werkzeug</td><td>安全工具库</td></tr>
        </tbody>
    </table>
</div>

<div class="help-section">
    <h2>已修复的漏洞</h2>
    <ul>
        <li>SQL 注入（参数化查询）</li>
        <li>任意文件上传（扩展名白名单 + 内容检测）</li>
        <li>业务逻辑漏洞（充值校验 + 权限控制）</li>
        <li>文件包含漏洞（路径白名单 + 规范化校验）</li>
    </ul>
</div>
